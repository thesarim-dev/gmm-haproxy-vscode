global
    daemon
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 50000
    nbthread 4
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    option redispatch
    retries 3
    timeout http-request 10s
    timeout queue 1m
    timeout connect 10s
    timeout client 1m
    timeout server 1m
    timeout http-keep-alive 10s
    timeout check 10s
    maxconn 3000

frontend http-in
    bind *:80
    # Redirect HTTP to HTTPS
    http-request redirect scheme https unless { ssl_fc }
    default_backend web-backend

frontend https-in
    bind *:443 ssl crt /etc/ssl/certs/haproxy.pem
    mode http
    option httplog
    acl is_api path_beg /api
    acl is_static path_beg /static
    use_backend api-backend if is_api
    use_backend static-backend if is_static
    default_backend web-backend

backend web-backend
    mode http
    balance roundrobin
    option httpchk GET /health HTTP/1.1
    http-check expect status 200
    server web1 10.0.0.1:8080 check inter 2s rise 2 fall 3
    server web2 10.0.0.2:8080 check inter 2s rise 2 fall 3

backend api-backend
    mode http
    balance leastconn
    option httpchk GET /api/health
    server api1 10.0.1.1:9000 check inter 2s
    server api2 10.0.1.2:9000 check inter 2s

backend static-backend
    mode http
    balance roundrobin
    server static1 10.0.2.1:80 check

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s

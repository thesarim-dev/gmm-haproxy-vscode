global
    daemon
    log stdout format raw local0
    maxconn 10000

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend http-in
    bind 192.0.2.10:80
    http-request redirect scheme https code 301 unless { ssl_fc }

frontend https-in
    bind 192.0.2.10:443 ssl crt /etc/haproxy/certs/example.com.pem alpn h2,http/1.1

    mode http

    acl host_app hdr(host) -i app.example.com
    acl host_api hdr(host) -i api.example.com

    use_backend app_backend if host_app
    use_backend api_backend if host_api
    default_backend app_backend

backend app_backend
    balance roundrobin

    server app1 198.51.100.10:8080 check
    server app2 198.51.100.11:8080 check

backend api_backend
    balance leastconn

    option httpchk GET /health

    server api1 203.0.113.10:9000 check
    server api2 203.0.113.11:9000 check
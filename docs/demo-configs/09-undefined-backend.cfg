# -----------------------------------------------------------------------------
# demo: undefined-backend.cfg
# CAPTURE INSTRUCTIONS:
#   1. Open this file with haproxy.version set to "3.1".
#   2. Wait for diagnostics to run.
#   3. Focus the warning on "mobile-backend" in the use_backend directive.
#   4. Capture the editor and Problems panel if refreshing the README/Marketplace
#      undefined-backend demo asset.
#
# Expected diagnostic:
#   - "mobile-backend" is referenced by "use_backend", but no backend or listen
#     section named "mobile-backend" exists in this file.
#
# Keep this file intentionally small. It should show one cross-reference warning
# without unrelated syntax, deprecation, timeout, or unreferenced-backend noise.
# -----------------------------------------------------------------------------

global
    daemon
    maxconn 10000

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend public-http
    bind *:80
    acl is_mobile path_beg /mobile
    use_backend mobile-backend if is_mobile
    default_backend app-backend

backend app-backend
    balance roundrobin
    option httpchk GET /health
    server app1 192.0.2.10:8080 check

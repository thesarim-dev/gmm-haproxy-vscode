# ──────────────────────────────────────────────────────────────────────────────
# demo: validation.cfg
# INSTRUCCIONES PARA LA CAPTURA:
#   1. Abrí este archivo (asegurate que haproxy.version sea "3.1" en settings)
#   2. Esperá que aparezcan los squiggles de error/warning
#   3. Expandí el panel Problems (Ctrl+Shift+M) para que se vean todos
#   4. Hacé hover sobre algún error para ver el mensaje completo
#   5. Tomá la captura mostrando el código + panel Problems
#
# Errores y warnings esperados:
#   - Línea 22: 'option httpclose' → deprecated → WARNING con quick fix
#   - Línea 28: 'reqrep' → removed in 2.4 → ERROR con migration hint
#   - Línea 34: 'use_backend mobile-backend' → backend no definido → WARNING
#   - Línea 37: timeout value inválido → ERROR
# ──────────────────────────────────────────────────────────────────────────────

global
    daemon
    maxconn 20000

defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend legacy-app
    bind *:80
    # deprecated en HAProxy 1.9 — el plugin va a sugerir quick fix
    option httpclose
    default_backend app-backend

backend app-backend
    # reqrep fue removido en HAProxy 2.4
    reqrep ^Host:\ www\.example\.com  Host:\ example.com
    balance roundrobin
    server app1 10.0.0.1:8080 check

frontend router
    bind *:8080
    # backend referenciado que no existe
    use_backend mobile-backend if { path_beg /mobile }
    # timeout con formato inválido
    timeout client 999x
    default_backend app-backend

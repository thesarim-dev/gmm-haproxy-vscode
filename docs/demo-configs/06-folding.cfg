# ──────────────────────────────────────────────────────────────────────────────
# demo: folding.cfg
# INSTRUCCIONES PARA LA CAPTURA:
#   1. Abrí este archivo
#   2. Hacé click en las flechas de folding al lado de los números de línea
#      para colapsar algunas secciones (ej: defaults y los dos backends)
#   3. Dejá frontend expandido y el resto colapsado
#   4. Tomá la captura mostrando el contraste entre secciones abiertas/cerradas
# ──────────────────────────────────────────────────────────────────────────────

global
    log 127.0.0.1:514 local0 notice
    daemon
    nbthread 4
    maxconn 100000
    stats socket /var/run/haproxy.sock mode 660 level admin expose-fd listeners

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect     5s
    timeout client      60s
    timeout server      60s
    timeout http-request 15s
    timeout http-keep-alive 10s
    timeout queue       30s
    retries 3
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http

frontend web-frontend
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/haproxy.pem alpn h2,http/1.1
    http-request redirect scheme https code 301 if !{ ssl_fc }
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    acl is_api path_beg /api
    use_backend api-backend if is_api
    default_backend web-backend

backend web-backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server web1 10.0.0.1:8080 check inter 5s rise 2 fall 3
    server web2 10.0.0.2:8080 check inter 5s rise 2 fall 3
    server web3 10.0.0.3:8080 check inter 5s rise 2 fall 3

backend api-backend
    balance leastconn
    option httpchk GET /ping
    http-check expect status 204
    server api1 10.0.1.10:3000 check inter 3s rise 2 fall 2
    server api2 10.0.1.11:3000 check inter 3s rise 2 fall 2
    server api3 10.0.1.12:3000 check inter 3s rise 2 fall 2

listen stats
    bind *:8404
    stats enable
    stats uri /metrics
    stats refresh 10s
    stats auth monitor:s3cr3t

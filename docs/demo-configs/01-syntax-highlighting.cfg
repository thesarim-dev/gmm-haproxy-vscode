global
    log 127.0.0.1:514 local0 notice
    log 127.0.0.1:514 local1 warning
    daemon
    nbthread 4
    maxconn 50000
    pidfile /var/run/haproxy.pid
    stats socket /var/run/haproxy.sock mode 660 level admin

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close
    timeout connect     5s
    timeout client      30s
    timeout server      30s
    timeout http-request 10s
    timeout queue       60s
    retries 3

frontend web-public
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/haproxy.pem alpn h2,http/1.1
    mode http
    # Redirect HTTP to HTTPS
    http-request redirect scheme https code 301 if !{ ssl_fc }
    default_backend web-backend

backend web-backend
    balance roundrobin
    option httpchk GET /health HTTP/1.1\r\nHost:\ example.com
    http-check expect status 200
    server web1 10.0.0.1:8080 check inter 5s rise 2 fall 3
    server web2 10.0.0.2:8080 check inter 5s rise 2 fall 3
    server web3 10.0.0.3:8080 check inter 5s rise 2 fall 3 weight 2

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats auth admin:secret

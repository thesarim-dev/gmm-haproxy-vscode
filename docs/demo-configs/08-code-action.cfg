# ──────────────────────────────────────────────────────────────────────────────
# demo: code-action.cfg
# INSTRUCCIONES PARA LA CAPTURA (GIF):
#   1. Abrí este archivo (con haproxy.version = "3.1")
#   2. Esperá que aparezcan los warnings de deprecated en las líneas marcadas
#   3. Poné el cursor sobre "option httpclose" (línea ~25)
#   4. Aparece el ícono de bombilla (💡) o presioná Ctrl+. para ver Quick Fixes
#   5. Seleccioná "Replace 'option httpclose' with 'option http-server-close'"
#   6. Grabá el GIF mostrando: warning → lightbulb → quick fix → código corregido
#
# También podés repetir con "option forceclose" (línea ~30)
# ──────────────────────────────────────────────────────────────────────────────

global
    daemon
    maxconn 20000

defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s

backend legacy-backend
    # deprecated: el plugin sugiere reemplazar con "option http-server-close"
    option httpclose
    balance roundrobin
    server app1 10.0.0.1:8080 check

backend another-legacy
    # deprecated: también tiene quick fix disponible
    option forceclose
    balance leastconn
    server app2 10.0.0.2:8080 check
    server app3 10.0.0.3:8080 check

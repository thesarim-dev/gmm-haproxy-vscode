# ──────────────────────────────────────────────────────────────────────────────
# demo: completion.cfg
# INSTRUCCIONES PARA LA CAPTURA:
#   1. Abrí este archivo
#   2. Posicioná el cursor al final de la línea marcada con <-- CURSOR
#   3. Escribí un espacio o la primera letra para disparar el autocompletado
#   4. Grabá el GIF mostrando la lista de sugerencias
#
# Hay 3 buenos momentos para mostrar:
#   A) Dentro de backend — escribe "ba" y aparecen balance, ban, etc.
#   B) Dentro de frontend — escribe "http" y aparecen http-request, etc.
#   C) Después de "balance " — aparecen los algoritmos (roundrobin, leastconn…)
# ──────────────────────────────────────────────────────────────────────────────

global
    daemon
    maxconn 50000

defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend api-gateway
    bind *:80
    bind *:443 ssl crt /etc/ssl/haproxy.pem
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    # <-- CURSOR: escribí "http" acá para ver autocompletado de http-request
    default_backend api-backend

backend api-backend
    # <-- CURSOR: escribí "ba" acá para ver sugerencias de directivas
    balance
    # <-- CURSOR: posicioná el cursor después de "balance " para ver algoritmos
    option httpchk GET /ping
    server api1 10.0.1.10:3000 check
    server api2 10.0.1.11:3000 check

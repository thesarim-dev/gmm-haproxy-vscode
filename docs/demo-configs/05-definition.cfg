# demo: definition.cfg
# INSTRUCCIONES PARA LA CAPTURA (GIF):
#   1. Abrí este archivo
#   2. Poné el cursor sobre "api-backend" en la línea de use_backend (línea ~30)
#   3. Presioná F12 (Go to Definition) o Ctrl+Click
#   4. El cursor va a saltar a la definición del backend "api-backend" (línea ~38)
#   5. Grabá el GIF mostrando el salto
#
# También podés mostrar el peek definition con Alt+F12 para verlo inline.
# ──────────────────────────────────────────────────────────────────────────────

global
    daemon
    maxconn 50000

defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend api-gateway
    bind *:80
    bind *:443 ssl crt /etc/ssl/haproxy.pem

    # ACL routing
    acl is_api      path_beg /api
    acl is_static   path_beg /static
    acl is_websocket hdr(Upgrade) -i websocket

    use_backend api-backend      if is_api        # <-- F12 sobre "api-backend"
    use_backend static-backend   if is_static     # <-- F12 sobre "static-backend"
    use_backend ws-backend       if is_websocket  # <-- F12 sobre "ws-backend"
    default_backend api-backend

backend api-backend
    balance roundrobin
    option httpchk GET /health
    server api1 10.0.1.10:3000 check
    server api2 10.0.1.11:3000 check

backend static-backend
    balance roundrobin
    server cdn1 10.0.2.10:80 check
    server cdn2 10.0.2.11:80 check

backend ws-backend
    balance source
    option http-server-close
    option forceclose
    server ws1 10.0.3.10:8080 check
    server ws2 10.0.3.11:8080 check

# ──────────────────────────────────────────────────────────────────────────────
# demo: hover.cfg
# INSTRUCCIONES PARA LA CAPTURA:
#   1. Abrí este archivo
#   2. Poné el cursor sobre las palabras marcadas con <-- HOVER
#   3. Esperá que aparezca el tooltip con la documentación
#   4. Tomá la captura mostrando el hover completo (firma + descripción + sección)
#
# Buenos candidatos para hover:
#   A) "balance" → muestra algoritmos disponibles y descripción
#   B) "option httpchk" → muestra la firma completa con parámetros
#   C) "timeout connect" → muestra el formato de timeout y valores típicos
#   D) "stick-table" → documentación extensa y detallada
# ──────────────────────────────────────────────────────────────────────────────

global
    daemon
    maxconn 50000
    log 127.0.0.1 local0

defaults
    mode http
    log global
    timeout connect 5s     # <-- HOVER sobre "timeout"
    timeout client  30s
    timeout server  30s

frontend web
    bind *:443 ssl crt /etc/ssl/haproxy.pem
    http-request set-header X-Real-IP %[src]   # <-- HOVER sobre "http-request"
    default_backend web-backend

backend web-backend
    balance leastconn       # <-- HOVER sobre "balance" para ver algoritmos
    option httpchk GET /health HTTP/1.1\r\nHost:\ example.com   # <-- HOVER sobre "option httpchk"
    http-check expect status 200
    stick-table type ip size 100k expire 30m    # <-- HOVER sobre "stick-table"
    stick on src
    server web1 10.0.0.1:8080 check inter 3s
    server web2 10.0.0.2:8080 check inter 3s

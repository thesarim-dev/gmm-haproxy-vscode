# ──────────────────────────────────────────────────────────────────────────────
# demo: symbols.cfg
# INSTRUCCIONES PARA LA CAPTURA:
#   1. Abrí este archivo
#   2. Abrí el panel Outline (Explorer > OUTLINE) o presioná Ctrl+Shift+O
#   3. Expandí algunos nodos para mostrar los símbolos hijos (bind, server, acl)
#   4. Tomá la captura mostrando el código a la izquierda y el Outline a la derecha
#
# El outline va a mostrar:
#   global, defaults, frontend web (con hijos: bind, acl), frontend admin,
#   backend web-backend (con hijos: server x3), backend auth-backend,
#   listen stats, userlist admins
# ──────────────────────────────────────────────────────────────────────────────

global
    log 127.0.0.1 local0
    daemon
    maxconn 50000

defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s

frontend web
    bind *:80
    bind *:443 ssl crt /etc/ssl/haproxy.pem
    acl is_api      path_beg /api
    acl is_admin    path_beg /admin
    use_backend api-backend   if is_api
    use_backend admin-backend if is_admin
    default_backend web-backend

frontend monitoring
    bind *:9000
    default_backend web-backend

backend web-backend
    balance roundrobin
    server web1 10.0.0.1:8080 check
    server web2 10.0.0.2:8080 check
    server web3 10.0.0.3:8080 check

backend api-backend
    balance leastconn
    server api1 10.0.1.10:3000 check
    server api2 10.0.1.11:3000 check

backend admin-backend
    balance roundrobin
    acl auth_ok http_auth(admins)
    http-request auth realm HAProxy if !auth_ok
    server admin1 10.0.2.10:8080 check

listen stats
    bind *:8404
    stats enable
    stats uri /stats

userlist admins
    user admin   password $6$rounds=100000$salt$hashedpassword
    user monitor password $6$rounds=100000$salt$hashedpassword2
